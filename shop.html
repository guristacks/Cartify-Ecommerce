<!doctype html>
<html lang="en">

<head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Mobile Optimization -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Title -->
    <title>Cartify – Modern Ecommerce Shopping Experience</title>

    <!-- SEO -->
    <meta name="description"
        content="Cartify is a modern ecommerce platform offering a seamless shopping experience with premium products, fast checkout, and user-friendly design. Shop smarter with Cartify." />
    <meta name="keywords"
        content="Cartify, ecommerce website, online shopping, buy products online, modern ecommerce, shopping platform, fast checkout" />
    <meta name="author" content="Cartify" />

    <!-- Open Graph (Social Sharing) -->
    <meta property="og:title" content="Cartify – Modern Ecommerce Shopping Experience" />
    <meta property="og:description"
        content="Discover Cartify – a modern ecommerce platform designed for smooth shopping, fast checkout, and premium products." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://cartify-ecommerce-landing.vercel.app/images/preview.jpg" />
    <meta property="og:url" content="https://cartify-ecommerce-landing.vercel.app/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cartify – Modern Ecommerce Shopping Experience" />
    <meta name="twitter:description"
        content="Shop smarter with Cartify. Premium ecommerce experience with fast checkout and smooth UI." />
    <meta name="twitter:image" content="https://cartify-ecommerce-landing.vercel.app/images/preview.jpg" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://cartify-ecommerce-landing.vercel.app/" />

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="images/favicon.png" />

    <!-- Mobile Hero Image Preload -->
    <link rel="preload" as="image" href="Images/Hero/hero-1-desk.webp" media="(min-width: 481px)">
    <link rel="preload" as="image" href="Images/Hero/hero-1-phn.webp" media="(max-width: 480px)">

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- CSS -->
    <link rel="preload" href="style.css" as="style" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- HEADER -->
    <header class="flex ac" role="banner">
        <div class="container">
            <nav class="navbar flex ac sb">
                <div class="ham"><svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" viewBox="0 0 24 24"
                        fill="#fff">
                        <path d="M16 18V20H5V18H16ZM21 11V13H3V11H21ZM19 4V6H8V4H19Z"></path>
                    </svg></div>
                <div class="close hide"><svg xmlns="http://www.w3.org/2000/svg" width="25" height="25"
                        viewBox="0 0 24 24" fill="#fff">
                        <path
                            d="M10.5859 12L2.79297 4.20706L4.20718 2.79285L12.0001 10.5857L19.793 2.79285L21.2072 4.20706L13.4143 12L21.2072 19.7928L19.793 21.2071L12.0001 13.4142L4.20718 21.2071L2.79297 19.7928L10.5859 12Z">
                        </path>
                    </svg></div>
                <div class="nav-left">
                    <a href="index.html" class="logo"> Cartify </a>
                </div>

                <ul class="nav-links flex ac">
                    <li class="home-link"><a href="#">Home</a></li>
                    <li class="about-link"><a href="#">About</a></li>
                    <li class="shop-link"><a href="#">Shop</a></li>
                    <li class="contact-link"><a href="#">Contact</a></li>
                </ul>

                <div class="nav-right flex ac">
                    <button>Login</button>
                </div>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main role="main"></main>

    <!-- FOOTER -->
    <footer role="contentinfo"></footer>

    <!-- LENIS -->
    <script src="https://unpkg.com/lenis@1.3.18/dist/lenis.min.js" defer></script>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" crossorigin="anonymous"
        referrerpolicy="no-referrer" defer></script>

    <!-- SCROLL TRIGGER -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js" crossorigin="anonymous"
        referrerpolicy="no-referrer" defer></script>

    <!-- JS FILE -->
    <script src="Js/script.js" defer></script>
</body>

</html>
