<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- Mobile Optimization -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <!-- Title -->
    <title>Cartify – Modern Ecommerce Shopping Experience</title>

    <!-- SEO -->
    <meta name="description"
        content="Cartify is a modern ecommerce platform offering a seamless shopping experience with premium products, fast checkout, and user-friendly design. Shop smarter with Cartify.">
    <meta name="keywords"
        content="Cartify, ecommerce website, online shopping, buy products online, modern ecommerce, shopping platform, fast checkout">
    <meta name="author" content="Cartify">

    <!-- Open Graph (Social Sharing) -->
    <meta property="og:title" content="Cartify – Modern Ecommerce Shopping Experience">
    <meta property="og:description"
        content="Discover Cartify – a modern ecommerce platform designed for smooth shopping, fast checkout, and premium products.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://cartify-ecommerce-landing.vercel.app/images/preview.jpg">
    <meta property="og:url" content="https://cartify-ecommerce-landing.vercel.app/">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Cartify – Modern Ecommerce Shopping Experience">
    <meta name="twitter:description"
        content="Shop smarter with Cartify. Premium ecommerce experience with fast checkout and smooth UI.">
    <meta name="twitter:image" content="https://cartify-ecommerce-landing.vercel.app/images/preview.jpg">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://cartify-ecommerce-landing.vercel.app/">

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="images/favicon.png">

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- CDN - REMIX ICON -->
    <!-- <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" /> -->

    <!-- CSS -->
    <link rel="preload" href="style.css" as="style">
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- HEADER -->
    <header class="flex ac" role="banner">
        <div class="container">

            <nav class="navbar flex ac sb">
                <div class="ham">
                    Menu
                </div>
                <div class="nav-left">
                    <a href="index.html" class="logo">
                        Cartify
                    </a>
                </div>

                <ul class="nav-links flex ac">
                    <li class="home-link"><a href="#">Home</a></li>
                    <li class="about-link"><a href="#">About</a></li>
                    <li class="shop-link"><a href="#">Shop</a></li>
                    <li class="contact-link"><a href="#">Contact</a></li>
                </ul>

                <div class="nav-right flex ac">
                    <a href="#">Cart</a>
                </div>
            </nav>

        </div>
    </header>

    <!-- Main Content -->
    <main role="main">

        <section class="hero flex ac jc">
            <div class="hero-images">

                <picture class="hero-img active">
                    <source media="(max-width: 480px)" srcset="Images/Hero/hero-1-phn.webp">
                    <img src="Images/Hero/hero-1-desk.webp" alt="">
                </picture>

                <picture class="hero-img">
                    <source media="(max-width: 480px)" srcset="Images/Hero/hero-2-phn.webp">
                    <img src="Images/Hero/hero-2-desk.webp" alt="">
                </picture>

                <picture class="hero-img">
                    <source media="(max-width: 480px)" srcset="Images/Hero/hero-3-phn.webp">
                    <img src="Images/Hero/hero-3-desk.webp" alt="">
                </picture>

                <picture class="hero-img">
                    <source media="(max-width: 480px)" srcset="Images/Hero/hero-4-phn.webp">
                    <img src="Images/Hero/hero-4-desk.jpg" alt="">
                </picture>

            </div>
            <div class="hero-content">
                <span id="count"><em>01</em></span>
                <button id="nextBtn"><em>Next</em></button>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer role="contentinfo"></footer>

    <!-- LENIS -->
    <!-- <script src="https://unpkg.com/lenis@1.3.18/dist/lenis.min.js" defer></script> -->

    <!-- GSAP -->
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" crossorigin="anonymous"
        referrerpolicy="no-referrer" defer></script> -->

    <!-- SCROLL TRIGGER -->
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js" crossorigin="anonymous"
        referrerpolicy="no-referrer" defer></script> -->

    <!-- JS FILE -->
    <script src="Js/script.js" defer></script>

</body>

</html>
